<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_2" data-name="Layer 2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1370.79 270">
  <defs>
    <style>
      svg {
        color: #052326;
      }
      .cls-1 {
        fill: #3668ea;
        opacity: 0;
        transform-origin: 1310.4px 217.81px;
        animation: dropDot 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulseDot 1.8s infinite ease-in-out 1.8s;
      }
      .cls-2 {
        fill: #ffc225;
        opacity: 0;
        transform-origin: 1297.12px 138.76px;
        animation: dropDot 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulseDot 1.8s infinite ease-in-out 1.6s;
      }
      .cls-3 {
        fill: #12bc93;
        opacity: 0;
        transform-origin: 1281.64px 116.82px;
        animation: dropDot 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulseDot 1.8s infinite ease-in-out 1.4s;
      }

      /* Main logo paths line tracing and filling animation */
      #Layer_1-2 > g > path:not([class]) {
        stroke: #052326;
        stroke-width: 1.5px;
        stroke-dasharray: 1500;
        stroke-dashoffset: 1500;
        fill: #052326;
        fill-opacity: 0;
        animation: drawAndFill 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      #Layer_1-2 > g > path:not([class]):nth-of-type(1) { animation-delay: 0s; }
      #Layer_1-2 > g > path:not([class]):nth-of-type(2) { animation-delay: 0.05s; }
      #Layer_1-2 > g > path:not([class]):nth-of-type(3) { animation-delay: 0.1s; }
      #Layer_1-2 > g > path:not([class]):nth-of-type(4) { animation-delay: 0.15s; }
      #Layer_1-2 > g > path:not([class]):nth-of-type(5) { animation-delay: 0.2s; }
      #Layer_1-2 > g > path:not([class]):nth-of-type(6) { animation-delay: 0.25s; }
      #Layer_1-2 > g > path:not([class]):nth-of-type(7) { animation-delay: 0.3s; }
      #Layer_1-2 > g > path:not([class]):nth-of-type(8) { animation-delay: 0.35s; }

      @keyframes drawAndFill {
        0% {
          stroke-dashoffset: 1500;
          fill-opacity: 0;
        }
        70% {
          stroke-dashoffset: 0;
          fill-opacity: 0;
          stroke: #052326;
        }
        95% {
          stroke-dashoffset: 0;
          fill-opacity: 1;
          stroke: #052326;
        }
        100% {
          stroke-dashoffset: 0;
          fill-opacity: 1;
          stroke: transparent;
        }
      }

      @keyframes dropDot {
        0% {
          opacity: 0;
          transform: translateY(-300px);
        }
        60% {
          opacity: 1;
          transform: translateY(15px);
        }
        80% {
          transform: translateY(-8px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulseDot {
        0%, 100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.25);
          opacity: 0.75;
        }
      }
    </style>
  </defs>
